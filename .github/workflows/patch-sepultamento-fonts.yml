name: Patch sepultamento font sizes

on:
  push:
    branches:
      - fix/increase-sepultamento-small-fonts

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Raise small body fonts to 9 pt
        run: |
          python - <<'PY'
          import hashlib
          import json
          import re
          import zipfile
          from pathlib import Path

          docx_path = Path('public/templates/official/sepultamento/ordem-sepultamento.docx')
          temp_path = docx_path.with_suffix('.tmp.docx')
          font_pattern = re.compile(rb'(<w:sz(?:Cs)?\b[^>]*\bw:val=")(\d+)(")')

          def raise_small_font(match: re.Match[bytes]) -> bytes:
              value = int(match.group(2))
              if value >= 18:
                  return match.group(0)
              return match.group(1) + b'18' + match.group(3)

          changed = 0
          with zipfile.ZipFile(docx_path, 'r') as source, zipfile.ZipFile(temp_path, 'w') as target:
              for info in source.infolist():
                  data = source.read(info.filename)
                  if info.filename == 'word/document.xml':
                      data, replacements = font_pattern.subn(raise_small_font, data)
                      changed += replacements
                  target.writestr(info, data)

          if not changed:
              temp_path.unlink(missing_ok=True)
              raise SystemExit('No small font declarations found; nothing to patch.')

          temp_path.replace(docx_path)
          digest = hashlib.sha256(docx_path.read_bytes()).hexdigest()
          size = docx_path.stat().st_size

          catalog_path = Path('public/templates/official/catalogo-modelos.json')
          catalog = json.loads(catalog_path.read_text(encoding='utf-8'))
          item = next(entry for entry in catalog if entry['id'] == 'ordem-sepultamento')
          item['tamanhoBytes'] = size
          item['sha256'] = digest
          catalog_path.write_text(json.dumps(catalog, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          test_path = Path('src/lib/__tests__/official-template-fidelity.test.ts')
          test_text = test_path.read_text(encoding='utf-8')
          pattern = re.compile(
              r'("public/templates/official/sepultamento/ordem-sepultamento\.docx":\s*\n\s*")([0-9a-f]{64})(")'
          )
          test_text, count = pattern.subn(rf'\g<1>{digest}\g<3>', test_text, count=1)
          if count != 1:
              raise RuntimeError('Could not update sepultamento hash in fidelity test')
          test_path.write_text(test_text, encoding='utf-8')

          print(f'Updated {changed} font declarations; size={size}; sha256={digest}')
          PY

      - name: Commit patched template
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            public/templates/official/sepultamento/ordem-sepultamento.docx \
            public/templates/official/catalogo-modelos.json \
            src/lib/__tests__/official-template-fidelity.test.ts
          git commit -m "fix: aumenta fontes pequenas da ordem de sepultamento"
          git push
