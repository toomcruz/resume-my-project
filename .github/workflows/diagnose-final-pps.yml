name: Diagnose final PPS

on:
  push:
    branches:
      - fix/correct-sepultamento-jazigo-pps-flow

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Capture validation output
        run: |
          mkdir -p .final-diagnostics
          bunx vitest run > .final-diagnostics/tests.txt 2>&1 || true
          git diff --name-only --diff-filter=ACMRT origin/main...HEAD > .final-diagnostics/changed.txt
          mapfile -t format_files < <(grep -E '\.(ts|tsx|js|jsx|json|yml|yaml|css|scss|md|html)$' .final-diagnostics/changed.txt || true)
          mapfile -t lint_files < <(grep -E '\.(ts|tsx|js|jsx)$' .final-diagnostics/changed.txt || true)
          if [ "${#format_files[@]}" -gt 0 ]; then
            bunx prettier --check "${format_files[@]}" > .final-diagnostics/prettier.txt 2>&1 || true
          fi
          if [ "${#lint_files[@]}" -gt 0 ]; then
            bunx eslint "${lint_files[@]}" > .final-diagnostics/eslint.txt 2>&1 || true
          fi
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .final-diagnostics
          git commit -m "ci: registra diagnóstico final do fluxo PPS"
          git push
