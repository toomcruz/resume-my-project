name: Restore original DOCX layouts

on:
  push:
    branches:
      - fix/restore-original-docx-layouts

permissions:
  contents: write

jobs:
  restore:
    if: ${{ !contains(github.event.head_commit.message, '[docx-restored]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore canonical official documents
        shell: bash
        run: |
          set -euo pipefail

          git remote add original https://github.com/toomcruz/autofill-helper.git
          git fetch --no-tags original 64f16b3325d86885996a18c4307c5398aa1fdc7f

          git checkout FETCH_HEAD -- \
            public/templates/official/sepultamento/ordem-sepultamento.docx \
            public/templates/official/exumacao/ordem-exumacao.docx \
            public/templates/official/ossuario/aquisicao-renovacao-ossuario.docx \
            public/templates/official/atualizacao-cadastral/atualizacao-cadastral.docx

          git show FETCH_HEAD:public/templates/official/catalogo-modelos.json > /tmp/original-catalog.json

          python - <<'PY'
          import json
          from pathlib import Path

          official_templates = Path("src/lib/official-templates.ts")
          source = official_templates.read_text(encoding="utf-8")
          replacements = {
              'file: "sepultamento/ordem-sepultamento-jazigo.docx",': "file: item.arquivo,",
              'file: "exumacao/ordem-exumacao-jazigo.docx",': "file: item.arquivo,",
              'file: "ossuario/renovacao-ossuario.docx",': "file: item.arquivo,",
          }
          for old, new in replacements.items():
              if old not in source:
                  raise SystemExit(f"Expected template variant reference not found: {old}")
              source = source.replace(old, new)
          official_templates.write_text(source, encoding="utf-8")

          catalog_path = Path("public/templates/official/catalogo-modelos.json")
          current = json.loads(catalog_path.read_text(encoding="utf-8"))
          original = json.loads(Path("/tmp/original-catalog.json").read_text(encoding="utf-8"))
          original_by_id = {item["id"]: item for item in original}
          protected_ids = {
              "ordem-sepultamento",
              "ordem-exumacao",
              "aquisicao-renovacao-ossuario",
              "atualizacao-cadastral",
          }
          fidelity_keys = (
              "placeholders",
              "placeholderAliases",
              "tamanhoBytes",
              "sha256",
              "paginas",
          )
          for item in current:
              if item["id"] not in protected_ids:
                  continue
              baseline = original_by_id[item["id"]]
              for key in fidelity_keys:
                  item[key] = baseline[key]
          catalog_path.write_text(
              json.dumps(current, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          models_route = Path("src/routes/_authed.modelos.tsx")
          route_source = models_route.read_text(encoding="utf-8")
          route_source = route_source.replace(
              "Arquivos versionados no repositório, com placeholders e regras já catalogados.",
              "Arquivos originais preservados, com fonte, margens e estrutura oficiais.",
          )
          models_route.write_text(route_source, encoding="utf-8")

          variants_test = Path("src/lib/__tests__/official-template-variants.test.ts")
          test_source = variants_test.read_text(encoding="utf-8").replace(
              "// Regressões dos modelos oficiais reconstruídos para impressão.",
              "// Regressões de seleção dos modelos oficiais preservados.",
          )
          variants_test.write_text(test_source, encoding="utf-8")
          PY

      - name: Commit restored originals
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/restore-original-docx-layouts.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: restaura layout e tipografia originais dos DOCX [docx-restored]"
          git push origin HEAD:fix/restore-original-docx-layouts
