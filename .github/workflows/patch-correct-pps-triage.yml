name: Patch correct PPS triage

on:
  push:
    branches:
      - fix/correct-sepultamento-jazigo-pps-flow

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply correction
        run: |
          python3 <<'PY'
          from pathlib import Path

          def one(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f"Snippet not found in {path}: {old[:100]!r}")
              file.write_text(text.replace(old, new, 1))

          # 1. Pure sepultamento triage rules
          path = "src/lib/triagem-sepultamento.ts"
          one(path,
          '  subprocess?: string;\n  /** ISO YYYY-MM-DD. */',
          '  subprocess?: string;\n  /** Resposta obrigatória somente quando o sepultamento é em jazigo. */\n  jazigo_possui_gaveta_disponivel?: "sim" | "nao" | "";\n  /** Horário da Exumação PPS quando não há gaveta disponível. */\n  hora_exumacao_pps?: string;\n  /** ISO YYYY-MM-DD. */')
          one(path,
          '  "quadra_geral_gaveta",\n]);',
          '  "quadra_geral_gaveta",\n  "jazigo_possui_gaveta_disponivel",\n  "hora_exumacao_pps",\n]);')
          one(path,
          '  if (!state.data_agendada?.trim()) {\n    errors.push("Selecione a data do sepultamento.");\n  }',
          '  if (state.subprocess === "jazigo") {\n    if (\n      state.jazigo_possui_gaveta_disponivel !== "sim" &&\n      state.jazigo_possui_gaveta_disponivel !== "nao"\n    ) {\n      errors.push("Informe se há gaveta disponível no jazigo.");\n    } else if (\n      state.jazigo_possui_gaveta_disponivel === "nao" &&\n      !state.hora_exumacao_pps?.trim()\n    ) {\n      errors.push("Selecione o horário da Exumação PPS.");\n    }\n  }\n  if (!state.data_agendada?.trim()) {\n    errors.push("Selecione a data do sepultamento.");\n  }')
          one(path,
          '  if (state.subprocess === "quadra_geral" || state.subprocess === "jazigo") {\n    const { concessao, quadra_geral_gaveta } = applyLocalSepultamento(state.subprocess);\n    out.concessao = concessao;\n    out.quadra_geral_gaveta = quadra_geral_gaveta;\n  }\n  return out;',
          '  if (state.subprocess === "quadra_geral" || state.subprocess === "jazigo") {\n    const { concessao, quadra_geral_gaveta } = applyLocalSepultamento(state.subprocess);\n    out.concessao = concessao;\n    out.quadra_geral_gaveta = quadra_geral_gaveta;\n  }\n  if (state.subprocess === "jazigo" && state.jazigo_possui_gaveta_disponivel) {\n    out.jazigo_possui_gaveta_disponivel = state.jazigo_possui_gaveta_disponivel;\n  }\n  if (state.jazigo_possui_gaveta_disponivel === "nao" && state.hora_exumacao_pps) {\n    out.hora_exumacao_pps = state.hora_exumacao_pps;\n  }\n  return out;')

          # 2. Progressive triage UI
          path = "src/components/triagem-sepultamento.tsx"
          one(path,
          'import { getErrorMessage } from "@/lib/error-message";\n',
          'import { getErrorMessage } from "@/lib/error-message";\nimport { EXHUMATION_TIME_SLOTS } from "@/lib/domain/exhumation-slots";\n')
          one(path,
          'type StepId =\n  | "local"\n  | "data"\n',
          'type StepId =\n  | "local"\n  | "gaveta"\n  | "data"\n  | "horario_pps"\n')
          one(path,
          '    hora_sepultamento: extras.hora_sepultamento,\n    tem_velorio: inferredWakeChoice,',
          '    hora_sepultamento: extras.hora_sepultamento,\n    jazigo_possui_gaveta_disponivel:\n      (extras.jazigo_possui_gaveta_disponivel as "sim" | "nao" | "") || "",\n    hora_exumacao_pps: extras.hora_exumacao_pps,\n    tem_velorio: inferredWakeChoice,')
          one(path,
          '  const steps: StepId[] = useMemo(() => {\n    const base: StepId[] = ["local", "data", "horario", "velorio"];\n    if (state.tem_velorio === "SIM") base.push("sala", "detalhes_velorio");\n    base.push("placa");\n    return base;\n  }, [state.tem_velorio]);',
          '  const steps: StepId[] = useMemo(() => {\n    const base: StepId[] = ["local"];\n    if (state.subprocess === "jazigo") base.push("gaveta");\n    base.push("data");\n    if (\n      state.subprocess === "jazigo" &&\n      state.jazigo_possui_gaveta_disponivel === "nao"\n    ) {\n      base.push("horario_pps");\n    }\n    base.push("horario", "velorio");\n    if (state.tem_velorio === "SIM") base.push("sala", "detalhes_velorio");\n    base.push("placa");\n    return base;\n  }, [state.jazigo_possui_gaveta_disponivel, state.subprocess, state.tem_velorio]);')
          one(path,
          '    onExtrasChange({\n      concessao: derived.concessao,\n      quadra_geral_gaveta: derived.quadra_geral_gaveta,\n    });\n    next();\n  }\n\n  function pickQuickDate',
          '    const sameLocal = state.subprocess === local;\n    onExtrasChange({\n      concessao: derived.concessao,\n      quadra_geral_gaveta: derived.quadra_geral_gaveta,\n      jazigo_possui_gaveta_disponivel: sameLocal\n        ? state.jazigo_possui_gaveta_disponivel || ""\n        : "",\n      hora_exumacao_pps: sameLocal ? state.hora_exumacao_pps || "" : "",\n      tipo_agenda_exumacao: "",\n    });\n    next();\n  }\n\n  function pickGaveta(value: "sim" | "nao") {\n    onExtrasChange({\n      jazigo_possui_gaveta_disponivel: value,\n      hora_exumacao_pps: value === "sim" ? "" : extras.hora_exumacao_pps || "",\n      tipo_agenda_exumacao: value === "nao" ? "exumacao_pss" : "",\n    });\n    setTimeout(() => setStepIndex((index) => index + 1), 0);\n  }\n\n  function pickHorarioPps(horario: string) {\n    onExtrasChange({ hora_exumacao_pps: horario });\n    next();\n  }\n\n  function pickQuickDate')
          one(path,
          '  const stepLabels: Record<StepId, string> = {\n    local: "Local do sepultamento",\n    data: "Data",',
          '  const stepLabels: Record<StepId, string> = {\n    local: "Local do sepultamento",\n    gaveta: "Disponibilidade no jazigo",\n    data: "Data",\n    horario_pps: "Horário da Exumação PPS",')
          one(path,
          '          {step === "data" && (',
          '''          {step === "gaveta" && (\n            <section className="space-y-4">\n              <div className="space-y-1">\n                <Label className="text-base font-semibold">\n                  Há gaveta disponível no jazigo para este sepultamento?\n                </Label>\n                <p className="text-sm text-muted-foreground">\n                  Com gaveta disponível, segue somente o sepultamento. Sem gaveta, será\n                  necessária uma Exumação PPS para liberar a vaga.\n                </p>\n              </div>\n              <div className="grid grid-cols-2 gap-3">\n                <Chip\n                  selected={state.jazigo_possui_gaveta_disponivel === "sim"}\n                  onClick={() => pickGaveta("sim")}\n                  className="py-6"\n                >\n                  SIM, HÁ GAVETA\n                </Chip>\n                <Chip\n                  selected={state.jazigo_possui_gaveta_disponivel === "nao"}\n                  onClick={() => pickGaveta("nao")}\n                  className="py-6"\n                >\n                  NÃO, PRECISA LIBERAR VAGA\n                </Chip>\n              </div>\n            </section>\n          )}\n\n          {step === "data" && (''')
          one(path,
          '          {step === "horario" && (',
          '''          {step === "horario_pps" && (\n            <section className="space-y-3">\n              <div className="space-y-1">\n                <Label className="text-base font-semibold">Horário da Exumação PPS</Label>\n                <p className="text-sm text-muted-foreground">\n                  Esta etapa aparece somente porque o jazigo não tem gaveta disponível.\n                </p>\n              </div>\n              <div className="grid grid-cols-3 gap-3">\n                {EXHUMATION_TIME_SLOTS.map((horario) => (\n                  <Chip\n                    key={horario}\n                    selected={state.hora_exumacao_pps === horario}\n                    onClick={() => pickHorarioPps(horario)}\n                  >\n                    {horario}\n                  </Chip>\n                ))}\n              </div>\n            </section>\n          )}\n\n          {step === "horario" && (''')

          # 3. Connect runtime triage to document rules
          path = "src/lib/domain/context-adapter.ts"
          one(path,
          '    if (extras.has_wake === "sim" || extras.has_wake === "nao") {\n      ctx.has_wake = extras.has_wake;\n    }\n    if (extras.burial_here === "sim" || extras.burial_here === "nao") {\n      ctx.burial_here = extras.burial_here;\n    }',
          '    if (extras.has_wake === "sim" || extras.has_wake === "nao") {\n      ctx.has_wake = extras.has_wake;\n    } else if (extras.tem_velorio === "SIM") {\n      ctx.has_wake = "sim";\n    } else if (extras.tem_velorio === "NAO" || extras.sem_velorio === "SIM") {\n      ctx.has_wake = "nao";\n    }\n    ctx.burial_here = extras.burial_here === "nao" ? "nao" : "sim";\n    if (\n      extras.jazigo_possui_gaveta_disponivel === "sim" ||\n      extras.jazigo_possui_gaveta_disponivel === "nao"\n    ) {\n      ctx.jazigo_possui_gaveta_disponivel = extras.jazigo_possui_gaveta_disponivel;\n    }')

          # 4. Pure agenda rules
          path = "src/lib/agenda-sync.ts"
          one(path,
          'export function hasWake(extras: Record<string, string | undefined>): boolean {\n  return extras.tem_velorio === "SIM";\n}\n',
          'export function hasWake(extras: Record<string, string | undefined>): boolean {\n  return extras.tem_velorio === "SIM";\n}\n\nexport function burialRequiresPps(\n  subprocess: string | null | undefined,\n  extras: Record<string, string | undefined>,\n): boolean {\n  return (\n    subprocess === "jazigo" &&\n    extras.jazigo_possui_gaveta_disponivel === "nao"\n  );\n}\n')
          one(path,
          '  if (processKey === "sepultamento") return hasWake(extras);',
          '  if (processKey === "sepultamento") {\n    return hasWake(extras) || extras.jazigo_possui_gaveta_disponivel === "nao";\n  }')
          one(path,
          'export interface PpsScheduleInput {\n  processKey: ProcessKey;\n  tipoAgendaExumacao?: string | null;\n  data_agendada?: string;\n  hora_agendamento?: string;\n}',
          'export interface PpsScheduleInput {\n  processKey: ProcessKey;\n  subprocess?: string | null;\n  tipoAgendaExumacao?: string | null;\n  jazigoPossuiGavetaDisponivel?: string | null;\n  data_agendada?: string;\n  hora_agendamento?: string;\n}')
          one(path,
          'export function isPpsSchedule(input: PpsScheduleInput): boolean {\n  return (\n    input.processKey === "exumacao" &&\n    input.tipoAgendaExumacao === "exumacao_pss"\n  );\n}',
          'export function isPpsSchedule(input: PpsScheduleInput): boolean {\n  return (\n    (input.processKey === "exumacao" &&\n      input.tipoAgendaExumacao === "exumacao_pss") ||\n    (input.processKey === "sepultamento" &&\n      input.subprocess === "jazigo" &&\n      input.jazigoPossuiGavetaDisponivel === "nao")\n  );\n}')

          # 5. Runtime route
          path = "src/routes/_authed.atendimento.novo.tsx"
          one(path,
          'import { resolveAgendaType, shouldCreateAgendaEvent, validatePpsSchedule } from "@/lib/agenda-sync";\n',
          'import {\n  burialRequiresPps,\n  resolveAgendaType,\n  shouldCreateAgendaEvent,\n  validatePpsSchedule,\n} from "@/lib/agenda-sync";\n')
          one(path,
          'import { EXHUMATION_TIME_SLOTS } from "@/lib/domain/exhumation-slots";\n',
          '')
          old = '''  const proc = getProcess(processKey);\n  const isPps = processKey === "exumacao" && extras.tipo_agenda_exumacao === "exumacao_pss";\n  const visibleExtraFields = (\n    proc?.extraFields?.filter(\n      (field) => !field.showWhen || extras[field.showWhen.field] === field.showWhen.equals,\n    ) ?? []\n  ).map<ProcessExtraField>((field) => {\n    if (isPps && field.name === "hora_agendamento") {\n      return {\n        ...field,\n        type: "select",\n        options: EXHUMATION_TIME_SLOTS.map((slot) => ({\n          value: slot,\n          label: slot,\n        })),\n        description: "Exumação PSS: apenas 08:30, 09:00 ou 09:30.",\n      };\n    }\n    return field;\n  });'''
          new = '''  const proc = getProcess(processKey);\n  const visibleExtraFields =\n    proc?.extraFields?.filter(\n      (field) => !field.showWhen || extras[field.showWhen.field] === field.showWhen.equals,\n    ) ?? [];\n  const isSepultamentoPps =\n    processKey === "sepultamento" && burialRequiresPps(subprocess, extras);'''
          one(path, old, new)
          one(path,
          '    // Exumação em quadra geral já vai direto para a agenda normal.\n    // Em jazigo o operador precisa antes responder se há gaveta disponível.\n',
          '    // Exumação escolhida como processo sempre usa a agenda normal.\n    // PPS só é decidido dentro do Sepultamento em jazigo sem gaveta.\n')
          one(path,
          '        // Quadra geral nunca é PSS. Em jazigo limpamos a escolha para exigir\n        // a resposta explícita sobre disponibilidade de gaveta.\n        tipo_agenda_exumacao: value === "quadra_geral" ? "exumacao" : "",',
          '        tipo_agenda_exumacao: "exumacao",')
          one(path,
          '    if (proc.key === "sepultamento" && extras.tem_velorio !== "SIM") return false;',
          '    if (\n      proc.key === "sepultamento" &&\n      extras.tem_velorio !== "SIM" &&\n      !isSepultamentoPps\n    ) {\n      return false;\n    }')
          one(path,
          '        ? ["inicio_velorio", "fim_velorio", "sala_velorio", "local_sepultamento", "funeraria"]',
          '        ? [\n            "inicio_velorio",\n            "fim_velorio",\n            "sala_velorio",\n            "local_sepultamento",\n            "funeraria",\n            "hora_exumacao_pps",\n          ]')

          old_create = '''  async function createLinkedAgendaEvent(attendanceId: string, userId: string): Promise<void> {\n    if (!proc || !shouldCreateAgendaEvent(proc.key, extras)) return;\n    const eventDate = extras.data_agendada!.trim();\n    const agendaType = resolveAgendaType(proc.key, extras.tipo_agenda_exumacao);\n    if (!agendaType) return;\n\n    const isBurialWithWake = proc.key === "sepultamento";\n    const { error } = await db.from("agenda_events").insert({\n      user_id: userId,\n      attendance_id: attendanceId,\n      agenda_type: agendaType,\n      event_date: eventDate,\n      start_time: isBurialWithWake\n        ? extras.inicio_velorio || extras.hora_sepultamento || null\n        : extras.hora_agendamento || null,\n      end_time: isBurialWithWake ? extras.fim_velorio || null : null,\n      service: isBurialWithWake ? "Velório + Sepultamento" : proc.label,\n      location: isBurialWithWake ? extras.local_sepultamento || null : extras.localizacao || null,\n      room: isBurialWithWake ? extras.sala_velorio || null : null,\n      burial_time: isBurialWithWake ? extras.hora_sepultamento || null : null,\n      burial_location: isBurialWithWake ? extras.local_sepultamento || null : null,\n      funeral_home: isBurialWithWake ? extras.funeraria || null : null,\n      pss_reference:\n        agendaType === "exumacao_pss"\n          ? extras.referencia_pps || extras.referencia_pss || null\n          : null,\n      status: "agendado",\n      notes: notes || null,\n    });\n    if (error) throw new Error(`Atendimento criado, mas a agenda não foi salva: ${error.message}`);\n  }'''
          new_create = '''  async function createLinkedAgendaEvents(attendanceId: string, userId: string): Promise<void> {\n    if (!proc || !shouldCreateAgendaEvent(proc.key, extras)) return;\n    const eventDate = extras.data_agendada!.trim();\n    const rows: Array<Record<string, unknown>> = [];\n\n    if (proc.key === "sepultamento") {\n      if (extras.tem_velorio === "SIM") {\n        rows.push({\n          user_id: userId,\n          attendance_id: attendanceId,\n          agenda_type: "velorio_sepultamento" as AgendaType,\n          event_date: eventDate,\n          start_time: extras.inicio_velorio || extras.hora_sepultamento || null,\n          end_time: extras.fim_velorio || null,\n          service: "Velório + Sepultamento",\n          location: extras.local_sepultamento || null,\n          room: extras.sala_velorio || null,\n          burial_time: extras.hora_sepultamento || null,\n          burial_location: extras.local_sepultamento || null,\n          funeral_home: extras.funeraria || null,\n          pss_reference: null,\n          status: "agendado",\n          notes: notes || null,\n        });\n      }\n      if (isSepultamentoPps) {\n        rows.push({\n          user_id: userId,\n          attendance_id: attendanceId,\n          agenda_type: "exumacao_pss" as AgendaType,\n          event_date: eventDate,\n          start_time: extras.hora_exumacao_pps || null,\n          end_time: null,\n          service: "Exumação PPS para Pronto Sepultamento",\n          location: extras.local_sepultamento || null,\n          room: null,\n          burial_time: extras.hora_sepultamento || null,\n          burial_location: extras.local_sepultamento || null,\n          funeral_home: extras.funeraria || null,\n          pss_reference: extras.referencia_pps || extras.referencia_pss || null,\n          status: "agendado",\n          notes: notes || null,\n        });\n      }\n    } else {\n      const agendaType = resolveAgendaType(proc.key, extras.tipo_agenda_exumacao);\n      if (!agendaType) return;\n      rows.push({\n        user_id: userId,\n        attendance_id: attendanceId,\n        agenda_type: agendaType,\n        event_date: eventDate,\n        start_time: extras.hora_agendamento || null,\n        end_time: null,\n        service: proc.label,\n        location: extras.localizacao || null,\n        room: null,\n        burial_time: null,\n        burial_location: null,\n        funeral_home: null,\n        pss_reference: null,\n        status: "agendado",\n        notes: notes || null,\n      });\n    }\n\n    if (!rows.length) return;\n    const { error } = await db.from("agenda_events").insert(rows);\n    if (error) throw new Error(`Atendimento criado, mas a agenda não foi salva: ${error.message}`);\n  }'''
          one(path, old_create, new_create)
          one(path,
          '      tipoAgendaExumacao: extras.tipo_agenda_exumacao,\n      data_agendada: extras.data_agendada,\n      hora_agendamento: extras.hora_agendamento,',
          '      subprocess,\n      tipoAgendaExumacao: extras.tipo_agenda_exumacao,\n      jazigoPossuiGavetaDisponivel: extras.jazigo_possui_gaveta_disponivel,\n      data_agendada: extras.data_agendada,\n      hora_agendamento: isSepultamentoPps\n        ? extras.hora_exumacao_pps\n        : extras.hora_agendamento,')
          one(path,
          '      await createLinkedAgendaEvent(attendance.id, userId);',
          '      await createLinkedAgendaEvents(attendance.id, userId);')

          # Remove the question from Exumação/Jazigo; it belongs to Sepultamento/Jazigo.
          file = Path(path)
          text = file.read_text()
          start = text.find('            {processKey === "exumacao" && subprocess === "jazigo" && (\n')
          end_marker = '\n\n\n            <ExtraFields\n'
          end = text.find(end_marker, start)
          if start < 0 or end < 0:
              raise SystemExit("Misplaced exhumation question block not found")
          text = text[:start] + '            <ExtraFields\n' + text[end + len(end_marker):]
          validation = '''                  if (\n                    processKey === "exumacao" &&\n                    subprocess === "jazigo" &&\n                    !extras.tipo_agenda_exumacao\n                  ) {\n                    return toast.error(\n                      "Informe se há gaveta disponível no jazigo para escolher a agenda.",\n                    );\n                  }\n'''
          if validation not in text:
              raise SystemExit("Misplaced exhumation validation not found")
          text = text.replace(validation, "", 1)
          disabled = '''                  (!!proc.subprocessOptions && !subprocess) ||\n                  (processKey === "exumacao" &&\n                    subprocess === "jazigo" &&\n                    !extras.tipo_agenda_exumacao)\n'''
          if disabled not in text:
              raise SystemExit("Misplaced exhumation disabled condition not found")
          text = text.replace(disabled, '                  !!proc.subprocessOptions && !subprocess\n', 1)
          file.write_text(text)

          # 6. Tests
          path = "src/lib/__tests__/triagem-sepultamento.test.ts"
          one(path,
          '  it("buildTriagemOverrides usa placa digitada na triagem como fonte de verdade", () => {',
          '''  it("jazigo exige resposta sobre gaveta disponível", () => {\n    const errs = validateTriagemSepultamento({\n      subprocess: "jazigo",\n      data_agendada: "2026-07-16",\n      hora_sepultamento: "14:00",\n      tem_velorio: "NAO",\n    });\n    expect(errs[0]).toBe("Informe se há gaveta disponível no jazigo.");\n  });\n\n  it("jazigo sem gaveta exige horário da Exumação PPS", () => {\n    const errs = validateTriagemSepultamento({\n      subprocess: "jazigo",\n      jazigo_possui_gaveta_disponivel: "nao",\n      data_agendada: "2026-07-16",\n      hora_sepultamento: "14:00",\n      tem_velorio: "NAO",\n    });\n    expect(errs[0]).toBe("Selecione o horário da Exumação PPS.");\n  });\n\n  it("jazigo com gaveta segue sem Exumação PPS", () => {\n    const errs = validateTriagemSepultamento({\n      subprocess: "jazigo",\n      jazigo_possui_gaveta_disponivel: "sim",\n      data_agendada: "2026-07-16",\n      hora_sepultamento: "14:00",\n      tem_velorio: "NAO",\n    });\n    expect(errs).toEqual([]);\n  });\n\n  it("buildTriagemOverrides usa placa digitada na triagem como fonte de verdade", () => {''')
          file = Path(path)
          text = file.read_text()
          text = text.replace(
              '      subprocess: "jazigo",\n      data_agendada:',
              '      subprocess: "jazigo",\n      jazigo_possui_gaveta_disponivel: "sim",\n      data_agendada:',
          )
          file.write_text(text)

          path = "src/lib/__tests__/agenda-sync.test.ts"
          one(path,
          '  buildAgendaSyncPatch,\n  hasWake,',
          '  buildAgendaSyncPatch,\n  burialRequiresPps,\n  hasWake,')
          one(path,
          'describe("shouldCreateAgendaEvent", () => {',
          '''describe("burialRequiresPps", () => {\n  it("só exige PPS para jazigo sem gaveta", () => {\n    expect(\n      burialRequiresPps("jazigo", { jazigo_possui_gaveta_disponivel: "nao" }),\n    ).toBe(true);\n    expect(\n      burialRequiresPps("jazigo", { jazigo_possui_gaveta_disponivel: "sim" }),\n    ).toBe(false);\n    expect(\n      burialRequiresPps("quadra_geral", { jazigo_possui_gaveta_disponivel: "nao" }),\n    ).toBe(false);\n  });\n});\n\ndescribe("shouldCreateAgendaEvent", () => {''')
          one(path,
          '  it("creates a linked event for wake plus burial", () => {',
          '''  it("creates a PPS event for burial in jazigo without free drawer", () => {\n    expect(\n      shouldCreateAgendaEvent("sepultamento", {\n        data_agendada: "2026-07-20",\n        tem_velorio: "NAO",\n        jazigo_possui_gaveta_disponivel: "nao",\n      }),\n    ).toBe(true);\n  });\n\n  it("creates a linked event for wake plus burial", () => {''')

