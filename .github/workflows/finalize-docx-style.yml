name: Finalize DOCX style

on:
  push:
    branches:
      - fix/restore-original-docx-layouts

permissions:
  contents: write

jobs:
  finalize:
    if: ${{ !contains(github.event.head_commit.message, '[docx-final-style]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/restore-original-docx-layouts
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply Prettier and ESLint
        run: |
          bunx prettier --write \
            public/templates/official/catalogo-modelos.json \
            src/lib/__tests__/official-template-fidelity.test.ts \
            src/lib/__tests__/official-template-variants.test.ts \
            src/lib/official-templates.ts \
            src/routes/_authed.modelos.tsx
          bunx eslint --fix \
            src/lib/__tests__/official-template-fidelity.test.ts \
            src/lib/__tests__/official-template-variants.test.ts \
            src/lib/official-templates.ts \
            src/routes/_authed.modelos.tsx

      - name: Commit canonical style
        run: |
          rm .github/workflows/finalize-docx-style.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: aplica formato canônico aos ajustes DOCX [docx-final-style]"
          git push origin HEAD:fix/restore-original-docx-layouts
