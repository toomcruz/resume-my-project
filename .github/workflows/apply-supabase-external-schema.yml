name: Aplicar schema no Supabase externo

on:
  workflow_dispatch:
    inputs:
      confirm_project_ref:
        description: "Digite o Project Ref do Supabase externo para confirmar"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: supabase-external-schema
  cancel-in-progress: false

jobs:
  apply-schema:
    name: Aplicar schema consolidado
    if: ${{ github.event.inputs.confirm_project_ref == 'geprepccebxpdbhokuyl' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: supabase-external

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Instalar cliente PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Validar arquivo e conexão
        env:
          SUPABASE_EXTERNAL_DB_URL: ${{ secrets.SUPABASE_EXTERNAL_DB_URL }}
        run: |
          set -euo pipefail

          test -f supabase/migration_supabase_externo.sql
          grep -q '^BEGIN;' supabase/migration_supabase_externo.sql
          grep -q '^COMMIT;' supabase/migration_supabase_externo.sql

          if [[ -z "${SUPABASE_EXTERNAL_DB_URL:-}" ]]; then
            echo "::error::O secret SUPABASE_EXTERNAL_DB_URL não foi configurado no ambiente supabase-external."
            exit 1
          fi

          case "$SUPABASE_EXTERNAL_DB_URL" in
            postgres://*|postgresql://*)
              ;;
            *)
              echo "::error::SUPABASE_EXTERNAL_DB_URL não é uma connection string PostgreSQL válida. Não use a URL https://<project-ref>.supabase.co."
              exit 1
              ;;
          esac

          if [[ "$SUPABASE_EXTERNAL_DB_URL" == *"@db.geprepccebxpdbhokuyl.supabase.co:5432/"* ]]; then
            echo "::error::Foi usada a conexão direta db.geprepccebxpdbhokuyl.supabase.co, que depende de IPv6. GitHub Actions não alcança esse endpoint. No Supabase, abra Connect → Session pooler e copie a URI do Shared Pooler na porta 5432."
            exit 1
          fi

          if [[ "$SUPABASE_EXTERNAL_DB_URL" != *".pooler.supabase.com:5432/"* ]]; then
            echo "::error::Use obrigatoriamente a URI Session pooler do Supabase. Ela deve conter .pooler.supabase.com:5432/ e o usuário postgres.geprepccebxpdbhokuyl."
            exit 1
          fi

          if [[ "$SUPABASE_EXTERNAL_DB_URL" != *"postgres.geprepccebxpdbhokuyl:"* ]]; then
            echo "::error::A URI não parece pertencer ao projeto geprepccebxpdbhokuyl. Copie novamente a Session pooler em Connect."
            exit 1
          fi

      - name: Testar conexão com o Supabase externo
        env:
          SUPABASE_EXTERNAL_DB_URL: ${{ secrets.SUPABASE_EXTERNAL_DB_URL }}
          PGSSLMODE: require
        run: |
          psql --dbname="$SUPABASE_EXTERNAL_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --command="select current_database(), current_user;"

      - name: Aplicar schema no Supabase externo
        env:
          SUPABASE_EXTERNAL_DB_URL: ${{ secrets.SUPABASE_EXTERNAL_DB_URL }}
          PGSSLMODE: require
        run: |
          psql --dbname="$SUPABASE_EXTERNAL_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --file=supabase/migration_supabase_externo.sql

      - name: Verificar estrutura criada
        env:
          SUPABASE_EXTERNAL_DB_URL: ${{ secrets.SUPABASE_EXTERNAL_DB_URL }}
          PGSSLMODE: require
        run: |
          TABLE_COUNT=$(psql --dbname="$SUPABASE_EXTERNAL_DB_URL" --tuples-only --no-align --set=ON_ERROR_STOP=1 <<'SQL'
          SELECT count(*)
          FROM information_schema.tables
          WHERE table_schema = 'public'
            AND table_name IN (
              'profiles', 'attendances', 'attendance_images', 'document_templates',
              'generated_documents', 'agenda_events', 'exhumation_appointments',
              'funeral_processes', 'funeral_deceased', 'funeral_documents',
              'funeral_discrepancies', 'funeral_field_feedback', 'funeral_audit_log',
              'extraction_locks'
            );
          SQL
          )

          BUCKET_COUNT=$(psql --dbname="$SUPABASE_EXTERNAL_DB_URL" --tuples-only --no-align --set=ON_ERROR_STOP=1 <<'SQL'
          SELECT count(*)
          FROM storage.buckets
          WHERE public = false
            AND id IN ('attendance-images', 'document-templates', 'generated-documents');
          SQL
          )

          echo "Tabelas encontradas: $TABLE_COUNT/14"
          echo "Buckets privados encontrados: $BUCKET_COUNT/3"

          test "$TABLE_COUNT" = "14"
          test "$BUCKET_COUNT" = "3"
