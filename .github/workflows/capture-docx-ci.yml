name: Capture DOCX CI diagnostics

on:
  push:
    branches:
      - fix/restore-original-docx-layouts

permissions:
  contents: write

jobs:
  capture:
    if: ${{ !contains(github.event.head_commit.message, '[docx-diagnostics]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/restore-original-docx-layouts
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Capture exact validation output
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          mapfile -d '' changed_files < <(git diff --name-only --diff-filter=ACMRT -z origin/main...HEAD)

          prettier_files=()
          eslint_files=()
          for file in "${changed_files[@]}"; do
            case "$file" in
              *.ts|*.tsx|*.js|*.jsx|*.json|*.yml|*.yaml|*.css|*.scss|*.md|*.html)
                prettier_files+=("$file")
                ;;
            esac
            case "$file" in
              *.ts|*.tsx|*.js|*.jsx)
                eslint_files+=("$file")
                ;;
            esac
          done

          printf '%s\n' "${prettier_files[@]}" > ci-prettier-files.txt
          printf '%s\n' "${eslint_files[@]}" > ci-eslint-files.txt
          bunx prettier --check "${prettier_files[@]}" > ci-prettier-output.txt 2>&1 || true
          bunx eslint "${eslint_files[@]}" > ci-eslint-output.txt 2>&1 || true

      - name: Commit diagnostics
        shell: bash
        run: |
          rm .github/workflows/capture-docx-ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: registra diagnóstico do CI DOCX [docx-diagnostics]"
          git push origin HEAD:fix/restore-original-docx-layouts
