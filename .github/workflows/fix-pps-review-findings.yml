name: Fix PPS review findings

on:
  push:
    branches:
      - fix/correct-sepultamento-jazigo-pps-flow

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Apply review fixes
        run: |
          python3 <<'PY'
          from pathlib import Path

          def one(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text()
              if old not in text:
                  raise SystemExit(f"Snippet not found in {path}: {old[:120]!r}")
              p.write_text(text.replace(old, new, 1))

          path = "src/components/triagem-sepultamento.tsx"
          one(
              path,
              '      tipo_agenda_exumacao: value === "nao" ? "exumacao_pss" : "",',
              '      tipo_agenda_exumacao: "",',
          )

          path = "src/routes/_authed.atendimento.novo.tsx"
          one(
              path,
              'import type { AgendaType } from "@/lib/agenda";\n',
              'import type { TablesInsert } from "@/integrations/supabase/types";\n',
          )
          one(
              path,
              '  "funeraria",\n]);',
              '  "funeraria",\n  "jazigo_possui_gaveta_disponivel",\n  "hora_exumacao_pps",\n]);',
          )
          one(
              path,
              '    const rows: Array<Record<string, unknown>> = [];',
              '    const rows: TablesInsert<"agenda_events">[] = [];',
          )
          one(path, '          agenda_type: "velorio_sepultamento" as AgendaType,', '          agenda_type: "velorio_sepultamento",')
          one(path, '          agenda_type: "exumacao_pss" as AgendaType,', '          agenda_type: "exumacao_pss",')
          one(
              path,
              '                      hora_sepultamento: extras.hora_sepultamento,\n                      tem_velorio:',
              '                      hora_sepultamento: extras.hora_sepultamento,\n                      jazigo_possui_gaveta_disponivel:\n                        (extras.jazigo_possui_gaveta_disponivel as "sim" | "nao" | "") || "",\n                      hora_exumacao_pps: extras.hora_exumacao_pps,\n                      tem_velorio:',
          )
          old_summary = '''                    {extras.data_agendada}\n                    {processKey === "exumacao" && extras.tipo_agenda_exumacao === "exumacao_pss"\n                      ? " · Exumação PSS"\n                      : processKey === "exumacao"\n                        ? " · Agenda de Exumação"\n                        : " · Velório + Sepultamento"}'''
          new_summary = '''                    {extras.data_agendada}\n                    {processKey === "exumacao"\n                      ? " · Agenda de Exumação"\n                      : isSepultamentoPps && extras.tem_velorio === "SIM"\n                        ? " · Velório + Sepultamento · Exumação PPS"\n                        : isSepultamentoPps\n                          ? " · Sepultamento · Exumação PPS"\n                          : " · Velório + Sepultamento"}'''
          one(path, old_summary, new_summary)

          path = "src/lib/agenda-sync.ts"
          p = Path(path)
          text = p.read_text().replace("Exumação PSS", "Exumação PPS")
          p.write_text(text)

          path = "src/lib/__tests__/triagem-sepultamento.test.ts"
          one(
              path,
              '''  it("jazigo exige resposta sobre gaveta disponível", () => {\n    const errs = validateTriagemSepultamento({\n      subprocess: "jazigo",\n      jazigo_possui_gaveta_disponivel: "sim",\n      data_agendada: "2026-07-16",''',
              '''  it("jazigo exige resposta sobre gaveta disponível", () => {\n    const errs = validateTriagemSepultamento({\n      subprocess: "jazigo",\n      data_agendada: "2026-07-16",''',
          )
          one(
              path,
              '    expect(TRIAGEM_SEPULTAMENTO_REVIEW_KEYS.has("placa_identificacao")).toBe(true);\n',
              '    expect(TRIAGEM_SEPULTAMENTO_REVIEW_KEYS.has("placa_identificacao")).toBe(true);\n    expect(TRIAGEM_SEPULTAMENTO_REVIEW_KEYS.has("jazigo_possui_gaveta_disponivel")).toBe(true);\n    expect(TRIAGEM_SEPULTAMENTO_REVIEW_KEYS.has("hora_exumacao_pps")).toBe(true);\n',
          )
          PY

          bunx prettier --write \
            src/components/triagem-sepultamento.tsx \
            src/routes/_authed.atendimento.novo.tsx \
            src/lib/agenda-sync.ts \
            src/lib/__tests__/triagem-sepultamento.test.ts

      - name: Validate source
        run: |
          bunx vitest run \
            src/lib/__tests__/triagem-sepultamento.test.ts \
            src/lib/__tests__/agenda-sync.test.ts \
            src/lib/domain/__tests__/context-adapter.test.ts \
            src/lib/domain/__tests__/documents.test.ts
          bunx tsc --noEmit
          bun run build

      - name: Commit review fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/components/triagem-sepultamento.tsx \
            src/routes/_authed.atendimento.novo.tsx \
            src/lib/agenda-sync.ts \
            src/lib/__tests__/triagem-sepultamento.test.ts
          git commit -m "fix: conclui fluxo de gaveta e agenda PPS"
          git push
