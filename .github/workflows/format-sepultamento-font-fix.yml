name: Format sepultamento font fix

on:
  push:
    branches:
      - fix/increase-sepultamento-small-fonts

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format changed text files
        run: |
          bunx prettier --write \
            public/templates/official/catalogo-modelos.json \
            src/lib/__tests__/official-template-fidelity.test.ts

      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            public/templates/official/catalogo-modelos.json \
            src/lib/__tests__/official-template-fidelity.test.ts
          if git diff --cached --quiet; then
            echo "No formatting changes needed."
            exit 0
          fi
          git commit -m "style: formata ajuste de fonte do sepultamento"
          git push
