name: Format DOCX restoration

on:
  push:
    branches:
      - fix/restore-original-docx-layouts

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[docx-formatted]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/restore-original-docx-layouts
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format changed text files
        run: |
          bunx prettier --write \
            public/templates/official/catalogo-modelos.json \
            src/lib/official-templates.ts \
            src/routes/_authed.modelos.tsx \
            src/lib/__tests__/official-template-variants.test.ts \
            src/lib/__tests__/official-template-fidelity.test.ts

      - name: Commit formatting
        run: |
          rm .github/workflows/format-docx-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: formata restauração dos DOCX [docx-formatted]"
          git push origin HEAD:fix/restore-original-docx-layouts
