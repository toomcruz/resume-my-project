name: Fix merge style

on:
  push:
    branches:
      - fix/restore-original-docx-layouts

permissions:
  contents: write

jobs:
  fix:
    if: ${{ !contains(github.event.head_commit.message, '[merge-style-fixed]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/restore-original-docx-layouts
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply format-only merge fixes
        run: |
          bunx prettier --write \
            src/components/document-review.tsx \
            src/lib/domain/template-payload.ts \
            src/lib/vision/extract-image.server.ts \
            src/lib/vision/field-presentation.ts \
            public/templates/official/catalogo-modelos.json \
            src/lib/__tests__/official-template-fidelity.test.ts \
            src/lib/__tests__/official-template-variants.test.ts \
            src/lib/official-templates.ts \
            src/routes/_authed.modelos.tsx
          bunx eslint --fix \
            src/components/document-review.tsx \
            src/lib/domain/template-payload.ts \
            src/lib/vision/extract-image.server.ts \
            src/lib/vision/field-presentation.ts \
            src/lib/__tests__/official-template-fidelity.test.ts \
            src/lib/__tests__/official-template-variants.test.ts \
            src/lib/official-templates.ts \
            src/routes/_authed.modelos.tsx

      - name: Remove diagnostics and commit
        run: |
          rm -f \
            .github/workflows/fix-merge-style.yml \
            failed-merge-files.txt \
            failed-merge-prettier.txt \
            failed-merge-eslint.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: corrige validação do merge sem alterar comportamento [merge-style-fixed]"
          git push origin HEAD:fix/restore-original-docx-layouts
