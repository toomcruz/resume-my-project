name: Validate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: |
          base_sha="${{ github.event.pull_request.base.sha }}"
          if [ -z "$base_sha" ]; then
            base_sha="$(git rev-parse HEAD^)"
          fi

          mapfile -d '' changed_files < <(
            git diff --name-only --diff-filter=ACMRT -z "$base_sha"...HEAD
          )

          files=()
          for file in "${changed_files[@]}"; do
            case "$file" in
              *.ts|*.tsx|*.js|*.jsx|*.json|*.yml|*.yaml|*.css|*.scss|*.md|*.html)
                files+=("$file")
                ;;
            esac
          done

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No changed files supported by Prettier."
            exit 0
          fi

          bunx prettier --check "${files[@]}"

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript
        run: bunx tsc --noEmit

  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Tests
        run: bunx vitest run

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint changed files
        run: |
          base_sha="${{ github.event.pull_request.base.sha }}"
          if [ -z "$base_sha" ]; then
            base_sha="$(git rev-parse HEAD^)"
          fi

          mapfile -d '' changed_files < <(
            git diff --name-only --diff-filter=ACMRT -z "$base_sha"...HEAD
          )

          files=()
          for file in "${changed_files[@]}"; do
            case "$file" in
              *.ts|*.tsx|*.js|*.jsx)
                files+=("$file")
                ;;
            esac
          done

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No changed JavaScript or TypeScript files to lint."
            exit 0
          fi

          bunx eslint "${files[@]}"
